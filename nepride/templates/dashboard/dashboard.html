{% extends "base.html" %}
{% block content %}

<div class="container mt-5">

<h2 class="dashboard-title">Dashboard</h2>

<div class="row">

<div class="col-md-3">
    <div class="dashboard-card total">
        <h2>{{ total_rides }}</h2>
        <p>Total Rides</p>
    </div>
</div>

<div class="col-md-3">
    <div class="dashboard-card pending">
        <h2>{{ pending_rides }}</h2>
        <p>Pending Rides</p>
    </div>
</div>

<div class="col-md-3">
    <div class="dashboard-card accepted">
        <h2>{{ accepted_rides }}</h2>
        <p>Accepted Rides</p>
    </div>
</div>



    
<div class="col-md-3">
    <div class="dashboard-card completed">
        <h2>{{ completed_rides }}</h2>
        <p>Completed Rides</p>
    </div>
</div>





</div>

</div>
{% endblock content %}
