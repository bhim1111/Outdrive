{% extends "base.html" %}

{% block content %}
<div class="container my-5">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card shadow-sm">
                <div class="card-header bg-warning text-dark">
                    <h3 class="mb-0">Edit Ride</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {% if form.non_field_errors %}
                            <div class="alert alert-danger">{{ form.non_field_errors }}</div>
                        {% endif %}
                        <div class="mb-3">
                            <label for="pickup_location" class="form-label">Pickup Location</label>
                            <input type="text" class="form-control" id="pickup_location" name="pickup_location" value="{{ object.pickup_location }}" required>
                        </div>
                        <div class="mb-3">
                            <label for="dropoff_location" class="form-label">Dropoff Location</label>
                            <input type="text" class="form-control" id="dropoff_location" name="dropoff_location" value="{{ object.dropoff_location }}" required>
                        </div>
                        <div class="mb-3">
                            <label for="fare" class="form-label">Fare (NPR)</label>
                            <input type="number" step="0.01" class="form-control" id="fare" name="fare" value="{{ object.fare }}" required>
                        </div>
                        <button type="submit" class="btn btn-warning">Update Ride</button>
                        <a href="{% url 'ride_list' %}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
