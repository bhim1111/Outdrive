{% extends "base.html" %}

{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h2>Register</h2>
                </div>
                <div class="card-body">
                    <form method="post" action="{% url 'register' %}">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary">Register</button>

                    </form>
                    <p>
                        don't have an account? <a href="{% url 'login' %}">login here</a>
                    </p>

                </div>
            </div>
        </div>
    </div>

</div>




{% endblock content %}
